name: Package and attach addon zip

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create addon folder
        run: |
          mkdir -p build/ReSpec
          cp ReSpec.toc build/ReSpec/
          cp ReSpec.lua build/ReSpec/
          cp ReSpecDB.lua build/ReSpec/
          cp Settings.lua build/ReSpec/

      - name: Create zip
        run: |
          cd build
          zip -r ReSpec-${{ github.event.release.tag_name }}.zip ReSpec

      - name: Upload zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: build/ReSpec-${{ github.event.release.tag_name }}.zip
